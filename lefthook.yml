# Lefthook configuration for linting and formatting
# https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    lint:
      run: pnpm lint:fix
      stage_fixed: true
      priority: 1

    format:
      run: pnpm format
      stage_fixed: true
      priority: 2

    typecheck:
      run: pnpm typecheck
      priority: 3
